<!DOCTYPE html>
<html>
<head>
<title>Return Books</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body class="return-page">

<div class="return-overlay"></div>

<div class="return-container">

    <div class="return-header">
        <h2>📚 Return Books</h2>
        <p>Manage your rented and purchased books easily</p>
    </div>

    <div class="return-buttons">
        <button class="return-tab-btn" onclick="showRentBooks()">Return Rented Books</button>
        <button class="return-tab-btn" onclick="showBuyBooks()">Return Purchased Books</button>
    </div>

    <div id="returnList" class="return-list"></div>

</div>

<script src="script.js"></script>

</body>
</html>
